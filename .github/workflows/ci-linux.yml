name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: Linux
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true

      - name: Install X11/GL headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ensure python command exists
        run: |
          if ! command -v python >/dev/null; then
            sudo ln -s "$(which python3)" /usr/local/bin/python
          fi

      - name: Setup GoogleTest
        uses: Bacondish2023/setup-googletest@v1
        with:
          tag: v1.14.0

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh -build-only

      - name: Run tests
        id: run-tests
        run: app/build/tests/copilot-buddy-tests --gtest_output="xml:app/build/test-results.xml"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-linux
          path: app/build/copilot-buddy

      - name: Convert test results to CTRF
        if: always()
        run: npx junit-to-ctrf app/build/test-results.xml -o ctrf/results.json
        shell: bash

      - name: Report test results
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
