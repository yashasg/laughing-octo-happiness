name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: Linux
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true

      - name: Install X11/GL headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup GoogleTest
        uses: Bacondish2023/setup-googletest@v1
        with:
          tag: v1.14.0

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh -build-only

      - name: Run tests
        id: run-tests
        run: app/build/tests/copilot-buddy-tests --gtest_output="xml:app/build/test-results.xml"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-linux
          path: app/build/copilot-buddy

      - name: Upload test results
        if: steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: app/build/test-results.xml

      - name: Report test results
        if: steps.run-tests.outcome != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Linux)
          path: app/build/test-results.xml
          reporter: java-junit
