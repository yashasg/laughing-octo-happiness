name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: Linux
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true

      - name: Install X11/GL headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Setup GoogleTest
        run: |
          if [ -f /usr/local/lib/libgtest.a ] || [ -f /usr/lib/libgtest.a ]; then
            echo "GoogleTest already installed, skipping."
          else
            cd /tmp
            curl -sL https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz | tar -xz
            cmake -S googletest-1.14.0 -B googletest-1.14.0/build -DCMAKE_BUILD_TYPE=Release
            cmake --build googletest-1.14.0/build
            sudo cmake --install googletest-1.14.0/build
            rm -rf /tmp/googletest-1.14.0
          fi

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh -build-only

      - name: Run tests
        id: run-tests
        run: app/build/tests/copilot-buddy-tests --gtest_output="xml:app/build/test-results.xml"

      - name: Run smoke test
        run: app/build/tests/copilot-buddy-smoke --smoke 5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-linux
          path: app/build/copilot-buddy

      - name: Convert test results to CTRF
        if: always()
        run: npx junit-to-ctrf app/build/test-results.xml -o ctrf/results.json
        shell: bash

      - name: Report test results
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
