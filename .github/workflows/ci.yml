name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: self-hosted
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          NEED_INSTALL=false
          if ! command -v cmake >/dev/null || ! command -v clang >/dev/null; then
            NEED_INSTALL=true
          elif [ "$(cmake --version | head -1 | grep -oP '\d+\.\d+')" \< "3.24" ]; then
            echo "CMake $(cmake --version | head -1) is too old, need >= 3.24"
            NEED_INSTALL=true
          fi
          if [ "$NEED_INSTALL" = true ]; then
            echo "Installing/upgrading system dependencies..."
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              build-essential clang \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
              libgl1-mesa-dev libglu1-mesa-dev
            # Install recent CMake via official Kitware APT repo
            sudo apt-get install -y --no-install-recommends gpg wget
            wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/kitware.list
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends cmake
          else
            echo "System dependencies already installed (CMake $(cmake --version | head -1)), skipping."
          fi

      - name: Setup GoogleTest
        run: |
          if [ -f /usr/local/lib/libgtest.a ] || [ -f /usr/lib/libgtest.a ]; then
            echo "GoogleTest already installed, skipping."
          else
            echo "Installing GoogleTest v1.14.0..."
            cd /tmp
            curl -L https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz -o gtest.tar.gz
            tar -xzf gtest.tar.gz
            cd googletest-1.14.0
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --parallel
            sudo cmake --install build
            rm -rf /tmp/gtest.tar.gz /tmp/googletest-1.14.0
          fi

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh -build-only

      - name: Run tests
        id: run-tests
        run: app/build/tests/copilot-buddy-tests --gtest_output="xml:app/build/test-results.xml"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-linux
          path: app/build/copilot-buddy

      - name: Upload test results
        if: steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: app/build/test-results.xml

      - name: Report test results
        if: steps.run-tests.outcome != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Linux)
          path: app/build/test-results.xml
          reporter: java-junit

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gtest

      - name: Build
        run: ./build.sh -build-only

      - name: Run tests
        id: run-tests
        run: |
          TEST_BIN="app/build/tests/copilot-buddy-tests"
          [ -f "${TEST_BIN}.exe" ] && TEST_BIN="${TEST_BIN}.exe"
          RESULTS_PATH="$(cygpath -w app/build)/test-results.xml"
          "$TEST_BIN" --gtest_output="xml:$RESULTS_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-windows
          path: app/build/copilot-buddy.exe

      - name: Upload test results
        if: steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: app/build/test-results.xml

      - name: Report test results
        if: steps.run-tests.outcome != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Windows)
          path: app/build/test-results.xml
          reporter: java-junit

