name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh -test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-linux
          path: app/build/copilot-buddy

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: test-results.xml

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Linux)
          path: test-results.xml
          reporter: java-junit

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: build.bat -test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-buddy-windows
          path: app\build\Release\copilot-buddy.exe

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: test-results.xml

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Windows)
          path: test-results.xml
          reporter: java-junit

