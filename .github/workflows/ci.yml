name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Print version
        run: python -c "from version import __version__; print(f'Copilot Buddy v{__version__}')"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Smoke test — verify imports
        run: |
          python -c "from config import CopilotStatus, COPILOT_STATE_DIR"
          python -c "from status_monitor import StatusMonitor"
          python -c "from version import __version__"
